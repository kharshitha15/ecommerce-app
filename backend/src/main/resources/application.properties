spring.application.name=emostore

# Database configuration (using file-based H2 for persistence)
spring.datasource.url=jdbc:h2:file:./data/emostoredb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Uncomment below to use MySQL instead of H2
# spring.datasource.url=jdbc:mysql://localhost:3306/emostoredb?createDatabaseIfNotExist=true
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.hibernate.ddl-auto=update

server.port=8081

# Razorpay Configuration (Use test keys)
razorpay.api.key=rzp_test_YourTestKeyHere
razorpay.api.secret=YourTestSecretHere

# Upload dir
upload.dir=uploads/
